<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <title>The Trigons' Website Access</title>
  <style>
    html {
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
      background-image: url("bg.jpg");
    }

    @supports (display: grid) {
      html {
        background-image: url("bgsmall.webp");
      }

      @media (min-width: 800px) {
        html {
          background-image: url("bgmedium.webp");
        }
      }

      @media (min-width: 1600px) {
        html {
          background-image: url("bglarge.webp");
        }
      }
    }

    @supports (aspect-ratio: 1/1) {
      html {
        background-image: url("bgsmall.avif");
      }

      @media (min-width: 800px) {
        html {
          background-image: url("bgmedium.avif");
        }
      }

      @media (min-width: 1600px) {
        html {
          background-image: url("bglarge.avif");
        }
      }
    }

    .Section {
      border: 1px solid black;
      background-color: rgba(255, 255, 255, 0.7);
      border-radius: 20px;
      max-width: 1600px;
      background-image: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.15));
    }

    @media (prefers-color-scheme: dark) {
      html {
        color: white;
      }

      .Section {
        border-color: white;
        background-color: rgba(0, 0, 0, 0.7);
        background-image: linear-gradient(180deg, transparent, rgba(255, 255, 255, 0.15));
      }
    }

    #Websites {
      text-align: center;
    }

    .SiteButton p {
      margin: 5px 0;
      font-size: 24px;
    }
  </style>
</head>

<body>
  <div class="Section" role="heading">
    <h1>The Trigons' Website Access</h1>
    <p>The page to access my local websites via temporary URLs.</p>
  </div>
  <div class="Section" id="Websites" role="main">
    <button class="SiteButton">
      <img src="TheTrigonsSite.jpg">
      <p>The Trigons' Site</p>
      <p class="SiteStatus">Loading...</p>
    </button>
  </div>
  <div class="Section" role="contentinfo" id="Footer">(C) Triazler 2026</div>
</body>

</html>
